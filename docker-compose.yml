services:
  flask-app:
    build: ./backend
    command: bash -c "pip install --upgrade pip && pip install -r requirements.txt && python app.py"
    environment:
      - SUBSCRIPTION_KEY=${SUBSCRIPTION_KEY}
      - ENDPOINT=${ENDPOINT}
      - MONGO_URI=${MONGO_URI}
      - MONGO_DB_NAME=${MONGO_DB_NAME:-textgrader}
      - OLLAMA_HOST=${OLLAMA_HOST}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - CORS_ORIGINS=${CORS_ORIGINS}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRATION_HOURS=${JWT_EXPIRATION_HOURS}
      - ANALYTICS_CACHE_TTL_SECONDS=${ANALYTICS_CACHE_TTL_SECONDS}
      - APP_MODE=${APP_MODE}
      - FLASK_DEBUG=${FLASK_DEBUG}
    volumes:
      - ./backend:/app
    ports:
      - "5000:5000"
    restart: always
    networks:
      - my_custom_network

  frontend:
    container_name: quintana_frontend
    image: node:lts-alpine
    working_dir: "/frontend"
    command: sh -c "yarn && yarn prod"
    ports:
      - 3000:3000
    volumes:
      - ./frontend:/frontend
    restart: always
    networks:
      - my_custom_network

  ollama:
    image: ollama/ollama
    container_name: ollama
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    command: serve
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - my_custom_network
    restart: unless-stopped
    depends_on:
      - flask-app
      - frontend

networks:
  my_custom_network:
    driver: bridge

volumes:
  ollama_data:
